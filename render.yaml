# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  - type: web
    name: boss-resource-system
    env: node
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://boss-resource-system.onrender.com
    healthCheckPath: /api/health
    autoDeploy: true
